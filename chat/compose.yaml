services:
  munroe-chat:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_TAG:-v0.10.2}
    container_name: munroe-chat
    restart: unless-stopped
    ports:
      - "${MUNROE_CHAT_PORT:-3000}:8080"
    environment:
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:?Set WEBUI_SECRET_KEY in .env}"
      WEBUI_NAME: "${WEBUI_NAME:-Munroe Chat}"
      ENABLE_SIGNUP: "${ENABLE_SIGNUP:-false}"
      DEFAULT_USER_ROLE: "${DEFAULT_USER_ROLE:-pending}"
      ENABLE_OLLAMA_API: "${ENABLE_OLLAMA_API:-false}"
      ENABLE_OPENAI_API: "${ENABLE_OPENAI_API:-true}"
      OPENAI_API_BASE_URL: "${OPENAI_API_BASE_URL:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - munroe-chat-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  munroe-chat-data:
