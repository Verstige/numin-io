<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <rect width="800" height="280" fill="#0D0D0F"/>

  <g transform="translate(80, 80)">
    <!-- Tick ring - 8 short dashes at the cardinal + diagonal positions -->
    <g stroke="#C9A84C" stroke-width="2" stroke-linecap="round" opacity="0.5">
      <line x1="100" y1="0"   x2="100" y2="14"/>
      <line x1="100" y1="186" x2="100" y2="200"/>
      <line x1="0"   y1="100" x2="14"  y2="100"/>
      <line x1="186" y1="100" x2="200" y2="100"/>
      <line x1="34"  y1="34"  x2="42"  y2="42"/>
      <line x1="158" y1="34"  x2="166" y2="42"/>
      <line x1="34"  y1="166" x2="42"  y2="158"/>
      <line x1="158" y1="166" x2="166" y2="158"/>
    </g>

    <!-- Halo arc -->
    <path fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round" d="
      M 18 134 Q 78 38 100 28 Q 122 38 182 134
    "/>

    <!-- Satellites -->
    <circle cx="48"  cy="92"  r="4" fill="#C9A84C"/>
    <circle cx="152" cy="92"  r="4" fill="#C9A84C"/>

    <!-- Focal -->
    <circle cx="100" cy="134" r="14" fill="#C9A84C"/>
  </g>

  <text x="320" y="200" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="900" font-size="96" letter-spacing="8" fill="#ECECEC">MUNRO</text>
  <text x="80" y="252" font-family="'Inter', sans-serif" font-size="13" fill="#a0a0a8" letter-spacing="4" font-weight="600">FINDS THE SIGNAL IN THE NOISE</text>
</svg>
