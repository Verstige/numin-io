<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#0D0D0F" rx="6"/>
  <!-- 2 cardinal ticks only at 32px (top + left) so they're not noisy -->
  <g stroke="#C9A84C" stroke-width="1" stroke-linecap="round" opacity="0.4">
    <line x1="16" y1="2" x2="16" y2="5"/>
    <line x1="2"  y1="16" x2="5" y2="16"/>
    <line x1="27" y1="16" x2="30" y2="16"/>
  </g>
  <!-- Halo + focal only (no satellites - too noisy at 32px) -->
  <path fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="
    M 5 22 Q 12 8 16 7 Q 20 8 27 22
  "/>
  <circle cx="16" cy="24" r="4" fill="#C9A84C"/>
</svg>
